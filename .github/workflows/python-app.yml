# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: CI for homework 30

on:
  push:
    # branches: [ "master" ]
  pull_request:
    # branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3
      uses: actions/setup-python@v6
      with:
        python-version: '3.13' 
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 isort black mypy pytest pytest-asyncio
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Check imports with isort
      run: |
        # isort . --check --diff 2>&1
        echo "Текущая директория: $(pwd)"
        echo "Файлы .py в репозитории:"
        find . -name "*.py" -type f
        echo "Версия isort:"
        isort --version-number
        echo "Запуск isort --check --diff с явным перенаправлением:"
        isort . --check --diff --verbose 2>&1 || echo "Exit code: $?"
    - name: Check formatting with black
      run: |
        black . --check --diff
    - name: Type check with mypy
      run: |
        # mypy . --ignore-missing-imports
        mypy .
    - name: Test with pytest
      run: |
        pytest
